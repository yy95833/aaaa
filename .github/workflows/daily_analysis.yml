name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - market-only
          - stocks-only
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

concurrency:
  group: stock-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: |
          mkdir -p data logs reports



      - name: 执行股票分析
        env:
          # 只使用 Gemini，彻底避免 OpenAI / Kimi 干扰
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_MODEL_FALLBACK: gemini-2.5-flash-lite
          GEMINI_REQUEST_DELAY: '3.0'

          # 邮件通知
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVERS: ${{ secrets.EMAIL_RECEIVERS }}
          EMAIL_SENDER_NAME: ${{ secrets.EMAIL_SENDER_NAME }}

          # 企业微信
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
          WECHAT_MSG_TYPE: text

          # 自选股
          STOCK_LIST: ${{ secrets.STOCK_LIST }}

          # 运行配置
          REPORT_TYPE: simple
          SINGLE_STOCK_NOTIFY: true
          MARKET_REVIEW_REGION: cn
          MARKET_REVIEW_ENABLED: true
          ANALYSIS_DELAY: '0'
          TRADING_DAY_CHECK_ENABLED: true

          # 系统配置
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          ENABLE_CHIP_DISTRIBUTION: 'false'
          REALTIME_SOURCE_PRIORITY: tencent,akshare_sina,efinance,akshare_em

        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          FORCE_RUN_ARG=""

          echo "=========================================="
          echo "🚀 A股自选股智能分析系统"
          echo "=========================================="
          echo "⏰ 时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 运行模式: $MODE"
          echo "📊 自选股: $STOCK_LIST"
          echo "📝 报告类型: $REPORT_TYPE"
          echo "=========================================="

          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
            echo "⚡ 已启用强制运行模式（跳过交易日检查）"
          fi

          if [ "$MODE" = "market-only" ]; then
            python main.py --market-review $FORCE_RUN_ARG
          elif [ "$MODE" = "stocks-only" ]; then
            python main.py --no-market-review $FORCE_RUN_ARG
          else
            python main.py $FORCE_RUN_ARG
          fi

      - name: 上传分析报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30

      - name: 显示运行结果
        if: always()
        run: |
          echo ""
          echo "=========================================="
          echo "📊 分析完成"
          echo "=========================================="
          if [ -d "reports" ] && [ "$(ls -A reports 2>/dev/null)" ]; then
            echo "生成的报告:"
            ls -la reports/
          else
            echo "⚠️ 未生成报告文件"
          fi
          echo ""
          if ls logs/stock_analysis_*.log >/dev/null 2>&1; then
            echo "📜 最近日志（最后 30 行）:"
            tail -30 logs/stock_analysis_*.log 2>/dev/null || echo "无日志"
          fi
